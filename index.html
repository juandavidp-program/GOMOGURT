 <body>

<script type="text/javascript" id="dcoder_script">var btndark = document.getElementById("cambiar_dark");
var btnlight = document.getElementById("cambiar_light");
var titulo = document.getElementById("titulo");
var btnlinks = document.getElementById("enla");
var imglogo = document.getElementById("logot");

function light(){
  document.body.style.backgroundColor = "aqua";
  btnlight.style.display = "none";
  btndark.style.display = "block";
  btnlinks.style.color = "black";
  imglogo.src = "6ab9fed9-b2e6-4456-afd6-1324df407601.png";
}

function dark(){
  document.body.style.backgroundColor = "black"
  btnlight.style.display = "block";
  btndark.style.display = "none";
  btnlight.style.background = "black";
  btnlinks.style.color = "white";

}

btndark.addEventListener("click", dark);
btnlight.addEventListener("click", light);</script></body></html>
